name: e2e-parity
# Replaces bench-regression (ADR-058 revision): live HF-vs-lattice parity on
# the same runner. Reference runs first (warms the machine), lattice second.
# Gates on greedy token agreement, reports speed informationally.
#
# Required-check shape: the workflow ALWAYS triggers (no `paths:` filter on the
# PR or merge-group event), but the expensive macOS `parity` job only runs when
# engine files actually change. A cheap always-running `parity-gate` job is the *required*
# status context — it passes when there is nothing to check and mirrors the
# parity result when there is. This avoids the classic trap where a required
# check is path-filtered, never reports on unrelated PRs, and wedges them on
# "Expected — waiting for status to be reported".

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'crates/inference/src/**'
      - 'crates/embed/src/**'
      - 'scripts/ci-changed-files.sh'
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC
  workflow_dispatch:
  merge_group:
    branches: [main]
    types: [checks_requested]

# Cancel a PR's own superseded runs so they stop occupying the shared macOS
# runner pool (~5 concurrent, account-wide) while a newer push on the same PR
# waits behind them. Never cancel a push to main, a schedule, or a manual
# dispatch: none of those has a "next run" to fall back on if killed mid-flight.
# The event_name segment keeps a scheduled run and a main-push run from
# sharing one queue: GitHub cancels a PENDING run whenever another run enters
# its group, even with cancel-in-progress false, so a schedule/push/dispatch
# trio sharing github.ref could replace each other while queued.
concurrency:
  group: e2e-parity-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'

jobs:
  # Decide whether the engine surface changed. Output drives both the expensive
  # parity job and the required gate below.
  changes:
    name: detect-engine-changes
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          CI_HEAD_SHA: ${{ github.event.merge_group.head_sha || github.sha }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            echo "engine=true" >> "$GITHUB_OUTPUT"
            echo "→ $GITHUB_EVENT_NAME trigger: full parity suite REQUIRED"
            exit 0
          fi
          CHANGED=$(./scripts/ci-changed-files.sh)
          echo "Changed files:"
          echo "$CHANGED"
          # here-string, not `echo | grep -q`: -q exits at first match, echo gets
          # SIGPIPE, and under pipefail the pipeline reports 141 → the else branch
          # would silently skip the gate on large diffs (fail-open).
          # The wasm gate's own inputs (driver, harness, fixtures, the native
          # dump example) are included below so a PR that touches only those
          # still triggers wasm-parity. Without them, engine stays false and the
          # required parity-gate could pass green without the wasm path ever
          # running, a fail-open on the gate itself.
          if grep -E '^crates/(inference|embed)/src/|^crates/(inference|embed)/Cargo\.toml$|^Cargo\.lock$|^scripts/(ci-changed-files\.sh|e2e_parity_check\.py)$|^\.github/workflows/e2e-parity\.yml$|^crates/inference/tests/quarot_q4_composed_golden\.rs$|^crates/inference/tests/fixtures/quarot_q4_composed_v1/|^scripts/gen_quarot_q4_composed_golden\.py$|^scripts/wasm-parity\.sh$|^scripts/wasm-simd128-parity\.sh$|^crates/embed/tests/wasm/|^crates/embed/tests/fixtures/embed_parity_v1/|^crates/embed/examples/dump_parity_embeddings\.rs$|^scripts/ppl_gate_check\.py$|^crates/inference/tests/fixtures/ppl_gate_v1/|^crates/inference/src/bin/eval_perplexity\.rs$|^crates/inference/src/bin/quantize_q4\.rs$|^docs/bench_results/wiki\.test\.raw$|^crates/inference/tests/vision_s3_vit_forward_test\.rs$|^tests/fixtures/vision/|^scripts/vision_goldens_qwen35\.py$' <<<"$CHANGED" >/dev/null; then
            echo "engine=true" >> "$GITHUB_OUTPUT"
            echo "→ engine surface changed: parity REQUIRED"
          else
            echo "engine=false" >> "$GITHUB_OUTPUT"
            echo "→ no engine change: parity not required"
          fi

  parity:
    name: e2e parity
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: macos-latest
    # 25 min, not 15: typical runtime is ~12.5 min but shared-runner speed
    # variance exceeds the old ~17% headroom — two consecutive timeout
    # cancellations mid-prompt-4 on 2026-07-01 (issue #532). Now that the
    # gate fails closed, a timeout is a hard red, so the budget must cover
    # the slow tail of the runner pool.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: e2e-pip-${{ runner.os }}-py311-v1

      - name: Cache HF model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub/models--Qwen--Qwen3.5-0.8B
          key: hf-qwen35-0.8b-v1

      # Step 1: install reference framework (HF transformers + torch CPU).
      # Pinned to the known-green reference set — the exact versions that
      # produced the current passing parity baseline (extracted from a green
      # `e2e parity` run). An unpinned `pip install` lets a new transformers
      # release silently change greedy-generation behavior and flip the parity
      # verdict on borderline prompts (issue #236). To bump: change a pin, let
      # this gate re-run, and re-baseline the committed goldens if it moves.
      - name: Install Python deps
        run: pip install "torch==2.12.1" "transformers==5.12.1" "tokenizers==0.22.2" "huggingface_hub==1.20.1"

      # Step 2: download model if not cached
      - name: Download Qwen3.5-0.8B weights
        run: |
          python3 -c "
          from huggingface_hub import snapshot_download
          path = snapshot_download('Qwen/Qwen3.5-0.8B')
          print(f'Model at: {path}')
          "

      # Step 3: symlink model for lattice (expects flat dir with config.json + model.safetensors)
      - name: Setup lattice model dir
        run: |
          MODEL_CACHE=$(python3 -c "
          from huggingface_hub import snapshot_download
          print(snapshot_download('Qwen/Qwen3.5-0.8B'))
          ")
          mkdir -p ~/.lattice/models
          ln -sf "$MODEL_CACHE" ~/.lattice/models/qwen3.5-0.8b

      # Step 4: build lattice
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e-parity

      - name: Build lattice generate binary
        run: cargo build --release --bin qwen35_generate -p lattice-inference --features f16

      # Step 5: run parity check (HF first = warm machine, then lattice)
      - name: Run e2e parity check
        run: python3 scripts/e2e_parity_check.py
        env:
          E2E_REPORT_PATH: parity-report.md

      # Step 6: post results as PR comment
      - name: Post parity report
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: e2e-parity
          path: parity-report.md

  # REQUIRED Metal attention/KV-cache parity leg (issue #239, promoted per
  # ADR-066 F2 after a 2-week clean streak: 89/89 executed main-branch runs
  # green, 2026-07-04 through 2026-07-15, zero reds of any kind). e2e-parity
  # only ever exercised the CPU (qwen35_generate) path above; this job exists
  # to prove the Metal attention/KV dispatch helpers actually ran, not just
  # that a Metal device was present.
  #
  # Gotcha (do not "fix" by adding an Apple7 family check): GitHub's
  # macos-latest runner exposes a PARAVIRTUAL Metal device. Apple7-gated
  # kernels silently no-op there, so a naive "did it run" check can go green
  # without exercising anything. The audited attention/KV pipelines this job
  # targets are NOT Apple7-gated (only the optional tiled-GEMM path is), so
  # `runs-on: macos-latest` is expected to genuinely execute them — but the
  # gate does not trust that assumption. scripts/e2e_parity_check.py
  # --backend metal requires the runtime LATTICE_METAL_PATH_PROOF marker
  # (dispatch-site counters emitted by chat_metal) and FAILS CLOSED — never
  # skip-as-green — if the marker is missing or any required counter is zero.
  # If a future CI run proves the hosted runner cannot execute the required
  # kernels despite this, switch only `runs-on` to
  # `[self-hosted, macOS, ARM64, metal]` and document why.
  #
  # Wired into parity-gate.needs below: on engine-change PR runs the gate
  # fails unless this job succeeded. It remains skipped on merge-group events
  # so the macOS leg cannot delay the required queue jobs — the PR run is its
  # enforcement point, and the gate explicitly accepts skipped-on-merge-group
  # (and only that) as non-failing.
  metal-parity:
    name: metal attention parity
    needs: changes
    if: (needs.changes.outputs.engine == 'true' && github.event_name != 'merge_group') || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: e2e-pip-${{ runner.os }}-py311-v1

      - name: Cache HF model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub/models--Qwen--Qwen3.5-0.8B
          key: hf-qwen35-0.8b-v1

      - name: Install Python deps
        run: pip install "torch==2.12.1" "transformers==5.12.1" "tokenizers==0.22.2" "huggingface_hub==1.20.1"

      - name: Download Qwen3.5-0.8B weights
        run: |
          python3 -c "
          from huggingface_hub import snapshot_download
          path = snapshot_download('Qwen/Qwen3.5-0.8B')
          print(f'Model at: {path}')
          "

      - name: Setup lattice model dir
        run: |
          MODEL_CACHE=$(python3 -c "
          from huggingface_hub import snapshot_download
          print(snapshot_download('Qwen/Qwen3.5-0.8B'))
          ")
          mkdir -p ~/.lattice/models
          ln -sf "$MODEL_CACHE" ~/.lattice/models/qwen3.5-0.8b

      - uses: dtolnay/rust-toolchain@1.94.1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e-metal-parity

      - name: Build lattice Metal binary
        run: cargo build --release --bin chat_metal -p lattice-inference --features "f16,metal-gpu"

      - name: Run Metal attention/KV parity check
        run: python3 scripts/e2e_parity_check.py --backend metal
        env:
          LATTICE_BIN: target/release/chat_metal
          LATTICE_METAL_PATH_PROOF: '1'
          E2E_MAX_TOKENS: '4'
          E2E_REPORT_PATH: metal-parity-report.md

      - name: Ensure Metal report exists
        if: always()
        run: |
          test -s metal-parity-report.md || {
            printf '## Metal Attention/KV Parity Report\n\nNo report was produced. Check job logs.\n' > metal-parity-report.md
          }

      - name: Post Metal parity report
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: e2e-metal-parity
          path: metal-parity-report.md

  # Embedding-drift gate: re-embeds the 5 frozen BGE-small corpus texts and
  # asserts max per-vector (1 - cosine) < 1e-3 vs the committed baseline.
  #
  # Runs on macos-latest (arm64) to exercise the NEON normalise path that
  # crates/embed/src/simd/ dispatches on aarch64.  A geometry regression on
  # AVX2/x86_64 would also be caught here on the runner's scalar fallback, but
  # the primary reason for macOS is to match the NEON path that production
  # lattice deployments use.
  #
  # Model provisioning: the bge-small-en-v1.5 weights (~130 MB) are downloaded
  # via `cargo run ... --bin embed -- --download-only`, then cached per-run by
  # key "bge-small-en-v1.5-v1".  The key never changes because the weights are
  # immutable; if the model revision is bumped the cache key must be bumped too.
  #
  # Re-baseline procedure: when an intentional forward-path change lands, run
  #   cargo run --release -p lattice-embed --example dump_parity_embeddings
  # to regenerate, commit the new fixture, and rename _v1 → _v2 in both the
  # fixture directory and the test file.
  #
  # NOTE: once this job has gone green on CI once, add "embed-drift" to the
  # repository's required status checks (Settings → Branches → main protection
  # rule).  That governance step is done by the maintainers; it is intentionally
  # not automated here.
  embed-drift:
    name: embed drift gate
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: embed-drift

      - name: Cache BGE-small weights
        uses: actions/cache@v4
        with:
          path: ~/.lattice/models/bge-small-en-v1.5
          key: bge-small-en-v1.5-v1

      # Download weights into ~/.lattice/models/bge-small-en-v1.5 if not cached.
      - name: Provision bge-small-en-v1.5 weights
        run: |
          cargo run --release -p lattice-embed --bin embed \
            -- --model bge-small-en-v1.5 --download-only

      - name: Run embedding-drift gate
        # LATTICE_DRIFT_GATE_ENFORCE=1 makes the test fail-closed if the weights
        # are missing here (provisioning regression). The workspace-wide `cargo
        # test` CI job does NOT set this, so it cleanly skips when weights are
        # absent instead of panicking.
        env:
          LATTICE_DRIFT_GATE_ENFORCE: '1'
        run: |
          cargo test --release -p lattice-embed --test embed_drift_baseline \
            -- --nocapture

  # wasm embedding parity gate (PR #681). Proves the wasm32-compiled
  # `LatticeEmbedder` binding (crates/embed/src/wasm.rs) produces output that
  # matches both the committed HF-reference goldens and the native lattice
  # forward pass, for both a CLS-pooling model (bge-small-en-v1.5) and a
  # mean-pooling model (all-MiniLM-L6-v2), including a long-input MiniLM case
  # that exercises tokenizer-truncation behavior beyond the model's advisory
  # token cap. E5 and the multilingual paraphrase model are release-cadence
  # only, not gated per-PR. See scripts/wasm-parity.sh for the local driver
  # and crates/embed/tests/wasm/embed_parity_wasm.mjs for the harness.
  wasm-parity:
    name: wasm embedding parity gate
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-parity

      - name: Cache wasm-bindgen-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: wasm-bindgen-cli-0.2.105-${{ runner.os }}

      # Pinned exactly to match the `wasm-bindgen` crate dependency version in
      # crates/embed/Cargo.toml (the CLI and crate embed a schema version that
      # must match exactly). Skips the (slow) reinstall if the cached binary
      # is already the right version.
      - name: Install wasm-bindgen-cli
        run: |
          if command -v wasm-bindgen >/dev/null 2>&1 && [ "$(wasm-bindgen --version)" = "wasm-bindgen 0.2.105" ]; then
            echo "wasm-bindgen 0.2.105 already present (cache hit)"
          else
            cargo install wasm-bindgen-cli --version 0.2.105
          fi

      - name: Cache bge-small-en-v1.5 weights
        uses: actions/cache@v4
        with:
          path: ~/.lattice/models/bge-small-en-v1.5
          key: bge-small-en-v1.5-wasm-v1

      - name: Cache all-minilm-l6-v2 weights
        uses: actions/cache@v4
        with:
          path: ~/.lattice/models/all-minilm-l6-v2
          key: all-minilm-l6-v2-wasm-v1

      # --download-only fetches model.safetensors + vocab.txt; it does not
      # fetch config.json or tokenizer.json (native from_directory doesn't
      # need them from this exact spot; see download.rs). wasm-parity.sh
      # fetches those two directly from the HF repo into the same directory.
      - name: Provision bge-small-en-v1.5 weights
        run: |
          cargo run --release -p lattice-embed --bin embed \
            -- --model bge-small-en-v1.5 --download-only

      - name: Provision all-minilm-l6-v2 weights
        run: |
          cargo run --release -p lattice-embed --bin embed \
            -- --model all-minilm-l6-v2 --download-only

      - name: Run wasm parity gate
        # LATTICE_WASM_PARITY_ENFORCE=1 makes the driver fail closed if any
        # prerequisite (tool or model file) is still missing at this point:
        # a provisioning failure must not masquerade as a skipped, green job.
        env:
          LATTICE_WASM_PARITY_ENFORCE: '1'
        run: ./scripts/wasm-parity.sh

  # wasm32 SIMD128 kernel dispatch-parity gate. Proves the wasm32 SIMD128
  # dot/L2/cosine/normalize kernels (crates/embed/src/simd/*.rs) agree with
  # the scalar reference by building `lattice-embed` for wasm32 twice (plain
  # vs `-C target-feature=+simd128`) and comparing both against a JS scalar
  # oracle, plus a dispatch-state assertion proving each build actually
  # dispatched to the kernel tier it claims to. No model weights needed here
  # (pure vector-op kernels, not the BERT forward pass), so provisioning is
  # the same rust/wasm-bindgen setup as wasm-parity above minus the model
  # caching steps. See scripts/wasm-simd128-parity.sh for the local driver
  # and crates/embed/tests/wasm/simd128_parity_wasm.mjs for the harness.
  wasm-simd128-parity:
    name: wasm SIMD128 kernel parity gate
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-simd128-parity

      - name: Cache wasm-bindgen-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: wasm-bindgen-cli-0.2.105-${{ runner.os }}

      # Pinned exactly to match the `wasm-bindgen` crate dependency version in
      # crates/embed/Cargo.toml (the CLI and crate embed a schema version that
      # must match exactly). Skips the (slow) reinstall if the cached binary
      # is already the right version.
      - name: Install wasm-bindgen-cli
        run: |
          if command -v wasm-bindgen >/dev/null 2>&1 && [ "$(wasm-bindgen --version)" = "wasm-bindgen 0.2.105" ]; then
            echo "wasm-bindgen 0.2.105 already present (cache hit)"
          else
            cargo install wasm-bindgen-cli --version 0.2.105
          fi

      - name: Run wasm SIMD128 parity gate
        # LATTICE_WASM_SIMD128_ENFORCE=1 makes the driver fail closed if any
        # prerequisite (node, wasm-bindgen, cargo, or the wasm32 target) is
        # still missing at this point: a provisioning failure must not
        # masquerade as a skipped, green job.
        env:
          LATTICE_WASM_SIMD128_ENFORCE: '1'
        run: ./scripts/wasm-simd128-parity.sh

  # Composed rotated(QuaRot)+Q4 forward-path gate (issue #320). The converter's
  # own f64 forward-equivalence check (quant/quarot/forward_equivalence.rs) gates
  # the rotation-fusion math PRE-quantization; nothing previously exercised the
  # runtime consumer of a QuaRot+Q4 artifact — MetalQwen35State::from_q4_dir
  # followed by greedy decode. This job regenerates an EPHEMERAL QuaRot+Q4
  # artifact from the real Qwen3.5-0.8B weights, then asserts exact first-8
  # greedy token IDs per prompt against the committed frozen lattice-self golden
  # (crates/inference/tests/fixtures/quarot_q4_composed_v1/).
  #
  # Tolerance is exact token-ID agreement, NOT a logit tolerance: the golden is
  # generated FROM the Q4 artifact, so quantization error is already baked in and
  # a 1e-5-style float tolerance would be meaningless. LATTICE_Q4_COMPOSED_GATE_ENFORCE=1
  # makes the test fail-closed (panic, not skip) if the model/Q4 dir is missing
  # or the build lacks macOS+metal-gpu — so a provisioning failure cannot
  # masquerade as a green gate. This is the same fail-closed shape as embed-drift.
  #
  # The committed JSON golden is NEVER regenerated by CI (the regen script refuses
  # to overwrite without --update-golden). Updating it is a reviewable source
  # change that must carry rationale + mutation evidence.
  #
  # NOTE: once this job has gone green on CI once, add "q4-composed" to the
  # repository's required status checks alongside embed-drift. That
  # governance step is intentionally not automated here.
  q4-composed:
    name: q4 composed golden
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: q4-composed-pip-${{ runner.os }}-py311-v1

      - name: Cache HF model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub/models--Qwen--Qwen3.5-0.8B
          key: hf-qwen35-0.8b-v1

      # Only huggingface_hub is needed — lattice does the inference, so torch /
      # transformers (the reference framework) are not required for this gate.
      - name: Install Python deps
        run: pip install "huggingface_hub==1.20.1"

      - name: Download Qwen3.5-0.8B weights
        run: |
          python3 -c "
          from huggingface_hub import snapshot_download
          print(f'Model at: {snapshot_download(\"Qwen/Qwen3.5-0.8B\")}')
          "

      - name: Setup lattice model dir
        run: |
          MODEL_CACHE=$(python3 -c "
          from huggingface_hub import snapshot_download
          print(snapshot_download('Qwen/Qwen3.5-0.8B'))
          ")
          mkdir -p ~/.lattice/models
          ln -sf "$MODEL_CACHE" ~/.lattice/models/qwen3.5-0.8b

      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: q4-composed

      - name: Build QuaRot converter
        run: cargo build --release -p lattice-inference --bin quantize_quarot --features f16

      # Regenerate the ephemeral QuaRot+Q4 artifact (NOT committed). The frozen
      # golden the test asserts against WAS produced from this exact conversion
      # (same seed), so a green run proves the runtime composed path still matches.
      - name: Generate ephemeral QuaRot Q4 artifact
        run: |
          target/release/quantize_quarot \
            --model-dir ~/.lattice/models/qwen3.5-0.8b \
            --output-dir "$RUNNER_TEMP/qwen3.5-0.8b-quarot-q4" \
            --seed 0xCAFE_BABE_DEAD_BEEF \
            --num-probe-tokens 4

      - name: Run QuaRot Q4 composed golden gate
        env:
          LATTICE_Q4_COMPOSED_GATE_ENFORCE: '1'
          LATTICE_MODEL_DIR: ~/.lattice/models/qwen3.5-0.8b
          LATTICE_QUAROT_Q4_DIR: ${{ runner.temp }}/qwen3.5-0.8b-quarot-q4
        run: |
          cargo test --release -p lattice-inference \
            --test quarot_q4_composed_golden \
            --features "f16,metal-gpu" \
            -- --nocapture

  # ADR-069 S3a required gate: real Qwen3.5-0.8B ViT forward (CPU reference)
  # vs the committed HF differential golden (cosine > 0.999). Closes the gap
  # a static review found: the checkpoint-gated test only ran locally, never
  # in CI, so a patch-fold/RoPE/normalization/activation regression could
  # land while every required check stayed green (skip-as-green gate
  # failure). LATTICE_VISION_S3_GATE_ENFORCE=1 makes the test panic (not
  # skip) if the model dir is missing or invalid — same fail-closed shape as
  # embed-drift and q4-composed. The gating `cargo test` writes directly to
  # a log file (no pipeline), so its own non-zero exit aborts the `bash -e`
  # step before the log is printed; the grep assertions below
  # additionally prove the real numerical path executed (not just that the
  # process exited 0), so a future control-flow change that turns the
  # computation into an early return cannot silently pass this job.
  #
  # S3a is the CPU-reference stage (this PR); S3b (Metal port vs this CPU
  # reference under the GPU lock) is a separate fast-follow gate.
  #
  # NOTE: once this job has gone green on CI once, add "vision-s3-gate" to
  # the repository's required status checks alongside embed-drift and
  # q4-composed. That governance step is intentionally not automated here.
  vision-s3-gate:
    name: vision S3a cosine gate
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: e2e-pip-${{ runner.os }}-py311-v1

      - name: Cache HF model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub/models--Qwen--Qwen3.5-0.8B
          key: hf-qwen35-0.8b-v1

      - name: Install Python deps
        run: pip install "huggingface_hub==1.20.1"

      - name: Download Qwen3.5-0.8B weights
        run: |
          python3 -c "
          from huggingface_hub import snapshot_download
          print(f'Model at: {snapshot_download(\"Qwen/Qwen3.5-0.8B\")}')
          "

      - name: Setup lattice model dir
        run: |
          MODEL_CACHE=$(python3 -c "
          from huggingface_hub import snapshot_download
          print(snapshot_download('Qwen/Qwen3.5-0.8B'))
          ")
          mkdir -p ~/.lattice/models
          ln -sf "$MODEL_CACHE" ~/.lattice/models/qwen3.5-0.8b

      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: vision-s3-gate

      - name: Run S3a cosine gate (fail-closed)
        env:
          LATTICE_VISION_S3_MODEL_DIR: ~/.lattice/models/qwen3.5-0.8b
          LATTICE_VISION_S3_GATE_ENFORCE: '1'
        run: |
          cargo test --release -p lattice-inference --features f16 \
            --test vision_s3_vit_forward_test -- --nocapture > vision-s3-gate.log 2>&1
          cat vision-s3-gate.log
          grep -q 'LATTICE_VISION_S3_COSINE' vision-s3-gate.log
          grep -q 'LATTICE_VISION_S3_MUTATION_COSINE' vision-s3-gate.log

  # Fail-closed control-flow self-test for the Q4 PPL gate script (issue #616).
  # Cheap, deterministic, GPU-free (sandbox tree + stub eval_perplexity), so —
  # unlike q4-ppl-quality, whose PPL golden bootstraps on the runner — this has
  # no bootstrap and is wired into parity-gate.needs as a REQUIRED guard from day
  # one. It locks the gate's fail-closed contract (RECORD-on-null, ENFORCE
  # pass/fail, hard-fail on every provisioning/parse error, env-record cannot
  # mask an armed golden, non-finite golden rejected) against future regressions.
  ppl-gate-selftest:
    name: ppl-gate selftest
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run ppl-gate control-flow self-test
        run: bash scripts/ppl_gate_check_selftest.sh

  # Q4 perplexity regression gate (issue #616). Measures the UNROTATED Metal Q4
  # tier (the actually-shipping quantization) over a fixed WikiText-2 slice and
  # compares against a frozen golden PPL.
  #
  # Why unrotated Q4 and not the QuaRot delta: the original ADR-044 gate asserted
  # `quarot - unrotated < 0.5`. On the current forward path offline QuaRot v0 is
  # net-NEGATIVE (+1.9 PPL worse than unrotated asymmetric Q4) by design — Hadamard
  # forces symmetric Q4 (worse fidelity floor) and offline v0 has no online R3/R4
  # rotation to recover it. A "quarot must win" gate would red main on a known,
  # accepted limitation. So #616 repoints the gate to catch a REGRESSION in the
  # shipping tier. See ADR-044 "Conclusion superseded (2026-07-06)" + issue #703.
  #
  # Why an absolute golden captured on THIS runner (paravirtual Metal): the Q4
  # forward path is numerically correct on the hosted runner (proven by q4-composed)
  # but absolute PPL differs from real Apple-GPU, so the golden must be captured
  # here. The golden was captured via a null-sentinel RECORD bootstrap (run
  # 28841919096) and is now ARMED (golden.json `ppl` = 16.589111). The gate
  # enforces fail-closed (|measured - golden| > tolerance). Corpus-slice size and
  # tolerance rationale are documented in golden.json.
  #
  # ARMED + REQUIRED: this job is wired into parity-gate.needs (the required
  # status check). To keep the required leg from being silently de-armed, the run
  # step below sets LATTICE_PPL_GATE_REQUIRE_ARMED=1 — if a future change reverts
  # `ppl` to null, the gate fails CLOSED here instead of re-entering the fail-open
  # RECORD mode. Deliberate re-capture (per golden.json `_regenerate`) runs the
  # binary/script WITHOUT that flag.
  q4-ppl-quality:
    name: q4 ppl regression gate
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: q4-composed-pip-${{ runner.os }}-py311-v1

      - name: Cache HF model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub/models--Qwen--Qwen3.5-0.8B
          key: hf-qwen35-0.8b-v1

      - name: Install Python deps
        run: pip install "huggingface_hub==1.20.1"

      - name: Download Qwen3.5-0.8B weights
        run: |
          python3 -c "
          from huggingface_hub import snapshot_download
          print(f'Model at: {snapshot_download(\"Qwen/Qwen3.5-0.8B\")}')
          "

      - name: Setup lattice model dir
        run: |
          MODEL_CACHE=$(python3 -c "
          from huggingface_hub import snapshot_download
          print(snapshot_download('Qwen/Qwen3.5-0.8B'))
          ")
          mkdir -p ~/.lattice/models
          ln -sf "$MODEL_CACHE" ~/.lattice/models/qwen3.5-0.8b

      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: q4-ppl-quality

      - name: Build eval_perplexity + quantize_q4
        run: |
          cargo build --release -p lattice-inference \
            --bin eval_perplexity --bin quantize_q4 --features "f16,metal-gpu"

      # Regenerate the ephemeral unrotated Q4 artifact (NOT committed) from the
      # real weights. Deterministic: quantize_q4 has no random seed.
      # quantize_q4 writes .q4/.f16/quantize_index.json but NOT config.json, and
      # eval_perplexity's load_cfg_for_q4 reads config.json from the Q4 dir — so
      # copy it in (the tokenizer is supplied separately via --tokenizer-dir).
      - name: Generate ephemeral Q4 artifact
        run: |
          target/release/quantize_q4 \
            --model-dir ~/.lattice/models/qwen3.5-0.8b \
            --output-dir "$RUNNER_TEMP/qwen3.5-0.8b-q4"
          cp ~/.lattice/models/qwen3.5-0.8b/config.json "$RUNNER_TEMP/qwen3.5-0.8b-q4/config.json"

      - name: Run Q4 PPL regression gate
        env:
          LATTICE_PPL_Q4_DIR: ${{ runner.temp }}/qwen3.5-0.8b-q4
          LATTICE_PPL_TOKENIZER_DIR: ~/.lattice/models/qwen3.5-0.8b
          PPL_GATE_REPORT: ppl-gate-report.md
          # Required gate: refuse to pass green if the golden is ever de-armed
          # (ppl reverted to null). RECORD-mode re-capture runs without this flag.
          LATTICE_PPL_GATE_REQUIRE_ARMED: "1"
        run: python3 scripts/ppl_gate_check.py

      - name: Ensure report exists
        if: always()
        run: |
          test -s ppl-gate-report.md || {
            printf '## Q4 perplexity regression gate (#616)\n\nNo report produced. Check job logs.\n' > ppl-gate-report.md
          }

      - name: Post PPL gate report
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: q4-ppl-gate
          path: ppl-gate-report.md

  # REQUIRED status check. Always runs, always reports. Passes when the engine
  # did not change (nothing to verify); mirrors the parity, embed-drift,
  # wasm-parity, wasm-simd128-parity, q4-composed, vision-s3-gate,
  # ppl-gate-selftest, q4-ppl-quality, and metal-parity verdicts when it did.
  # Fails closed if change-detection itself errored. metal-parity is required
  # on PR runs (promoted per ADR-066 F2, issue #239); on merge-group events it
  # is skipped by design and the gate accepts exactly that skip — see its
  # comment above. q4-ppl-quality is now armed
  # (golden captured on run 28841919096) and gates the shipping Q4 tier for
  # regressions.
  parity-gate:
    name: parity-gate
    needs:
      [
        changes,
        parity,
        embed-drift,
        wasm-parity,
        wasm-simd128-parity,
        q4-composed,
        vision-s3-gate,
        ppl-gate-selftest,
        q4-ppl-quality,
        metal-parity,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Resolve gate
        run: |
          CHANGES_RESULT="${{ needs.changes.result }}"
          ENGINE="${{ needs.changes.outputs.engine }}"
          PARITY_RESULT="${{ needs.parity.result }}"
          DRIFT_RESULT="${{ needs.embed-drift.result }}"
          WASM_RESULT="${{ needs.wasm-parity.result }}"
          WASM_SIMD128_RESULT="${{ needs.wasm-simd128-parity.result }}"
          Q4_RESULT="${{ needs.q4-composed.result }}"
          VISION_S3_RESULT="${{ needs.vision-s3-gate.result }}"
          PPL_SELFTEST_RESULT="${{ needs.ppl-gate-selftest.result }}"
          Q4PPL_RESULT="${{ needs.q4-ppl-quality.result }}"
          METAL_RESULT="${{ needs.metal-parity.result }}"
          EVENT_NAME="${{ github.event_name }}"
          echo "changes=$CHANGES_RESULT engine=$ENGINE parity=$PARITY_RESULT embed-drift=$DRIFT_RESULT wasm-parity=$WASM_RESULT wasm-simd128-parity=$WASM_SIMD128_RESULT q4-composed=$Q4_RESULT vision-s3-gate=$VISION_S3_RESULT ppl-gate-selftest=$PPL_SELFTEST_RESULT q4-ppl-quality=$Q4PPL_RESULT metal-parity=$METAL_RESULT event=$EVENT_NAME"
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::change-detection did not succeed — failing closed."
            exit 1
          fi
          if [ "$ENGINE" != "true" ]; then
            echo "No engine change — parity not required. PASS."
            exit 0
          fi
          if [ "$PARITY_RESULT" != "success" ]; then
            echo "::error::Engine changed and parity did not succeed (result=$PARITY_RESULT)."
            exit 1
          fi
          if [ "$DRIFT_RESULT" != "success" ]; then
            echo "::error::Engine changed and embed-drift gate did not succeed (result=$DRIFT_RESULT)."
            exit 1
          fi
          if [ "$WASM_RESULT" != "success" ]; then
            echo "::error::Engine changed and wasm-parity gate did not succeed (result=$WASM_RESULT)."
            exit 1
          fi
          if [ "$WASM_SIMD128_RESULT" != "success" ]; then
            echo "::error::Engine changed and wasm-simd128-parity gate did not succeed (result=$WASM_SIMD128_RESULT)."
            exit 1
          fi
          if [ "$Q4_RESULT" != "success" ]; then
            echo "::error::Engine changed and q4-composed golden did not succeed (result=$Q4_RESULT)."
            exit 1
          fi
          if [ "$VISION_S3_RESULT" != "success" ]; then
            echo "::error::Engine changed and vision S3a cosine gate did not succeed (result=$VISION_S3_RESULT)."
            exit 1
          fi
          if [ "$PPL_SELFTEST_RESULT" != "success" ]; then
            echo "::error::Engine changed and ppl-gate self-test did not succeed (result=$PPL_SELFTEST_RESULT)."
            exit 1
          fi
          if [ "$Q4PPL_RESULT" != "success" ]; then
            echo "::error::Engine changed and q4-ppl-quality regression gate did not succeed (result=$Q4PPL_RESULT)."
            exit 1
          fi
          if [ "$METAL_RESULT" != "success" ]; then
            if [ "$EVENT_NAME" = "merge_group" ] && [ "$METAL_RESULT" = "skipped" ]; then
              echo "metal-parity skipped on merge_group by design — its enforcement point is the PR run."
            else
              echo "::error::Engine changed and metal attention parity did not succeed (result=$METAL_RESULT)."
              exit 1
            fi
          fi
          echo "Engine changed; parity, embed-drift, wasm-parity, wasm-simd128-parity, q4-composed, vision-s3-gate, ppl-gate-selftest, q4-ppl-quality, and metal-parity all PASSED."
          exit 0
