name: CI

# NOTE: no `paths-ignore` on the PR or merge-group triggers below. Every job
# here is (or can be) a *required* status check, and a required check whose
# workflow never even runs leaves a PR or queue entry stuck on "Expected,
# waiting for status to be reported" forever. So this workflow always
# triggers on both. Docs-only changes are instead handled by gating `ci`,
# `feature-matrix`, `bench-compile`, and `msrv` on the `changes` job below.
#
# `ci` and `feature-matrix` are matrix jobs, so their required-check contexts
# come from matrix expansion ("CI (macos-latest)", "feature-matrix
# (ubuntu-latest)", etc). `jobs.<id>.if` is evaluated BEFORE the matrix
# expands, so a docs-only skip at job level never even creates those
# per-combination check runs; a required context that never gets created
# stays "Expected, waiting for status" forever, the exact trap this
# workflow's triggers are already written to avoid. So the matrix-expanded
# names are NOT the required contexts here: `ci-gate` at the bottom of this
# file is, mirroring `parity-gate` in e2e-parity.yml and `app-binaries-gate`
# in app-binaries.yml. It always runs, always reports, and fails closed if
# change-detection itself failed. `cargo-deny`, `typos`, and `actionlint` stay
# directly required because they are cheap ubuntu-only jobs. `rustdoc-lint` and
# `unwrap-in-lib-lint` remain informational and are deliberately not required.
#
# Rollout note: branch protection's required contexts were swapped on
# 2026-07-04 from the seven heavy job/matrix names to `ci-gate` (plus the
# unchanged direct required contexts). The `merge_group` trigger below makes
# the same contexts report on the synthetic queue commit before it can land.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
    types: [checks_requested]

# Cancel a PR's own superseded runs so they stop occupying the shared
# macOS runner pool (~5 concurrent, account-wide) while a newer push on the
# same PR waits behind them. Never cancel a push to main: main has no "next
# push" to fall back on if a run is killed mid-flight. The event_name segment
# keeps a push run and a workflow_dispatch run on the same ref out of each
# other's queue: GitHub cancels a PENDING run whenever another run enters its
# group, even with cancel-in-progress false, so two different trigger kinds
# sharing one group could still replace each other while queued.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  LATTICE_REQUIRE_FIXTURES: "1"

jobs:
  # Decide whether any Rust code changed. A PR that only touches markdown,
  # ADRs, LICENSE, .gitignore, or the Swift macOS app (apps/macos/**) cannot
  # affect this workspace's compilation, so it does not need the macOS/ARM
  # compile matrix below.
  changes:
    name: detect-code-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          CI_HEAD_SHA: ${{ github.event.merge_group.head_sha || github.sha }}
        run: |
          set -euo pipefail
          CHANGED=$(./scripts/ci-changed-files.sh)
          echo "Changed files:"
          echo "$CHANGED"
          # Non-Rust set: **/*.md, docs/**, LICENSE*, .gitignore, and the
          # macOS Studio app (apps/macos/**). Everything else counts as code,
          # including workflow files, Cargo.*, Makefile*, and scripts/**.
          # Conservative on purpose: when in doubt, run the matrix.
          #
          # apps/macos/** is the Swift app. It has no Rust surface, so it
          # cannot affect this workspace's compilation, and there is no Swift
          # job in this workflow that would validate it. The Rust binaries the
          # app bundles are covered separately by app-binaries.yml, which
          # triggers independently on every PR. So a Swift-only change should
          # not drag the whole macOS/ARM Rust matrix. A PR that touches BOTH
          # apps/macos and a Rust path still leaves the Rust file in NON_DOCS
          # below, so code=true and the full matrix runs.
          #
          # Two single greps against here-strings, not a `grep | grep -q` pipe:
          # a downstream `-q` can close its end of a pipe early and SIGPIPE the
          # upstream producer, and under `pipefail` that reports as the
          # pipeline's exit code instead of the match result (fail-open on a
          # large diff).
          NON_DOCS=$(grep -vE '(\.md$|^docs/|^LICENSE|^\.gitignore$|^apps/macos/)' <<<"$CHANGED" || true)
          if grep -q . <<<"$NON_DOCS"; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "→ non-docs files changed: full matrix REQUIRED"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "→ docs-only change: full matrix skipped"
          fi

  ci:
    name: CI
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e43eeffd51aefeea929f4ea14e09fd077153e788 # 1.94.1
        with:
          components: rustfmt, clippy
      - name: Pin the real toolchain bin on PATH
        # Some macos-latest runner images ship ~/.cargo/bin/cargo as a copy of
        # rustup-init rather than the rustup proxy, so `cargo fmt` fails with
        # "error: unexpected argument 'fmt'". rustup itself is unaffected — resolve
        # the real toolchain bin dir through it and put it first on PATH so every
        # later step (cache, clean, ci.sh) gets a working cargo. No-op on healthy
        # images and on Linux.
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - name: Clean lattice crates (force rebuild, keep dep cache)
        run: |
          cargo clean -p lattice-inference 2>/dev/null || true
          cargo clean -p lattice-embed 2>/dev/null || true
          cargo clean -p lattice-fann 2>/dev/null || true
          cargo clean -p lattice-tune 2>/dev/null || true
          cargo clean -p lattice-transport 2>/dev/null || true
      - run: ./scripts/ci.sh

  # The default `cargo test/clippy --workspace` only ever compiles DEFAULT
  # features. Feature-gated code (safetensors serialization, the inference-hook
  # bridge, train-backward, metal-gpu kernels) is invisible to it — that is how
  # two real LoRA save/load bugs shipped in `safetensors`-gated code that
  # default CI never built. This job compiles the gated surfaces so they cannot
  # silently rot. `--no-run` on test targets = type-check + codegen without
  # spending runner time executing.
  feature-matrix:
    name: feature-matrix
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e43eeffd51aefeea929f4ea14e09fd077153e788 # 1.94.1
        with:
          components: clippy
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: feature-matrix
          cache-on-failure: true
      - name: tune — safetensors + inference-hook + serde (compile tests)
        run: cargo test -p lattice-tune --features safetensors,inference-hook,serde --no-run
      - name: tune — train-backward (compile tests)
        run: cargo test -p lattice-tune --features train-backward --no-run
      # The `mixture` feature gates the experimental online router-refit module
      # (crates/tune/src/lora/router_update.rs) behind lattice-fann/online-router.
      # It is off by default, so the required `ci` job never compiles or RUNS its
      # fail-closed validation tests (empty-feedback, wrong context-dim, replay
      # buffer bounds). Build AND run them here so the feature cannot rot silently.
      - name: tune — mixture (online router-refit, build + run tests)
        run: cargo test -p lattice-tune --features mixture --lib
      # simulated-teacher gates the deterministic fixed-label test/example path
      # (label_single_simulated, label_batch_simulated). Off by default, so the
      # required `ci` job never compiles or runs it. Build AND run here so the
      # opt-in API cannot rot silently.
      - name: tune — simulated-teacher (build + run tests)
        run: cargo test -p lattice-tune --features simulated-teacher --lib
      - name: inference — f16 + train-backward
        run: cargo build -p lattice-inference --features f16,train-backward
      # wgpu-gpu is excluded from default builds and was silently broken under
      # --all-features (gpu/inner module-resolution rot) until #194. Build it on
      # both runners (wgpu compiles host-side without a GPU) so it cannot rot again.
      - name: inference — wgpu-gpu
        run: cargo build -p lattice-inference --features wgpu-gpu
      - name: fann — no default features
        run: cargo build -p lattice-fann --no-default-features
      # Run this target alone. `-p lattice-embed` resolves lattice-embed's own
      # `lattice-inference` feature table in isolation, which is the configuration
      # a standalone `cargo build -p lattice-embed`, `cargo install lattice-embed`,
      # or the wasm/npm build actually gets — and the one that drifted in #1094.
      #
      # Two things keep this out of the workspace-wide runs. The failure is
      # runtime-only: `SafetensorsFile` returns `InvalidSafetensors` for a
      # half-precision tensor rather than failing to build, so the `--no-run`
      # steps above cannot observe it. And lattice-tune's optional
      # `lattice-inference` dependency carries `features = ["f16"]`, so any
      # invocation that activates tune's `inference-hook` or `train-backward`
      # alongside lattice-embed unifies that `f16` into embed for free and the
      # regression reads green. Neither tune feature is in its defaults today, so
      # `cargo test --workspace` does not do this — but nothing enforces that,
      # which is why the guard runs on the isolated resolve instead. See #1095.
      - name: embed — f16 native dependency load guard (standalone, no workspace unification)
        run: cargo test -p lattice-embed --test f16_feature_load_guard
      # Metal kernels only exist on macOS; gate so Linux does not try to build them.
      - name: inference — metal-gpu (macOS only)
        if: runner.os == 'macOS'
        run: cargo build -p lattice-inference --features metal-gpu
      - name: embed — metal-gpu (macOS only)
        if: runner.os == 'macOS'
        run: cargo build -p lattice-embed --features metal-gpu
      # The two metal-gpu legs above build the lattice-inference and lattice-embed
      # libraries (the embed leg pulls in lattice-inference/metal-gpu transitively),
      # so a stale-field constructor in either library is already caught there. What
      # they do NOT compile is the rest of the workspace's metal-gpu surface: the
      # other default-member crates and the metal-gpu-gated binaries. A #537-class
      # drift (a constructor left with a stale field set after a struct grew fields)
      # in that surface compiles clean on both library legs, and the default-feature
      # `ci` job cannot see the metal-gpu surface at all. Compile-only workspace
      # check closes that gap.
      - name: workspace — metal-gpu check (macOS only)
        if: runner.os == 'macOS'
        run: cargo check --workspace --features metal-gpu
      # The required `ci` job runs `cargo clippy --workspace` with DEFAULT
      # features only, so the entire metal-gpu surface — including the ~18K-line
      # metal_qwen35.rs — was never linted, and 34 clippy errors accumulated
      # invisibly (#240). Lint the Metal surface on macOS so it cannot rot.
      # f16,metal-gpu is the production decode combo. --all-targets extends the
      # gate to examples, benches, and #[cfg(test)] modules — the same surface
      # where a second wave of lint debt (manual_let_else, approx_constant,
      # dead bench fields) had silently accumulated past the lib+bins gate.
      - name: inference — metal-gpu clippy (macOS only)
        if: runner.os == 'macOS'
        run: cargo clippy -p lattice-inference --all-targets --features f16,metal-gpu -- -D warnings
      - name: embed — metal-gpu clippy (macOS only)
        if: runner.os == 'macOS'
        run: cargo clippy -p lattice-embed --features metal-gpu -- -D warnings
      # `lattice_serve` and `chat_metal` require the metal-gpu feature (see
      # required-features in crates/inference/Cargo.toml), so their `#[cfg(test)]`
      # modules — including the #654 capability-matrix fixtures that pin the
      # request-validation contract of every serve surface — were built and
      # linted by the two steps above but never actually RUN by CI (#654: no
      # workflow step invoked `cargo test --bin lattice_serve`/`--bin chat_metal`
      # at all). A fixture nobody runs cannot catch drift. Run them here.
      # The `lattice` binary's own metal-gpu `#[cfg(test)]` suite has the same
      # gap: `render_prompt_matches_shared_chat_template` and the
      # `to_chat_messages_*` fixtures (#661, crates/inference/src/bin/lattice.rs)
      # pin the CPU (`render_prompt`) and Metal (`format_chat_template`) chat
      # renderers to identical ChatML output for the same conversation, but
      # nothing invoked `cargo test --bin lattice --features f16,metal-gpu`
      # under this feature set, so a future divergence between the two
      # renderers would compile and lint clean while the test that guards
      # against it never ran. Run it alongside the other two serve binaries.
      - name: inference — serve-surface capability-matrix fixtures (macOS only)
        if: runner.os == 'macOS'
        run: |
          # test-utils (issue #828) gates the real tiny tokenizer
          # `lattice_serve.rs`'s own `parity_table`/`production_adapter_
          # observation` modules now need to drive `enforce_prompt_window`
          # for real behind the shared field-level parity rows -- without
          # it here those modules would silently not compile/run under
          # this job, the same gap the test-utils comment below already
          # documents for `lattice.rs`.
          #
          # issue #828 round 2 medium finding: piping through `tee` would
          # report the PIPESTATUS-losing `tee` exit code to the shell, and
          # even with correct exit-status propagation, a step that only
          # checks the overall `cargo test` exit code cannot tell "both
          # test-utils-gated modules ran" apart from "the feature/module was
          # gated out and the other ~39 binary tests still exited 0" -- the
          # silent-skip mode this hunk's own comment above describes. Write
          # each binary's full output straight to a log (no pipe), preserve
          # `cargo test`'s own exit status via `$?` (not a piped command's),
          # THEN require an exact `parity_table::... ok` and
          # `production_adapter_observation::... ok` proof marker in that
          # log before the step can pass -- a module that silently stopped
          # compiling/running fails this step even though the rest of the
          # binary's tests still exit 0.
          check_test_utils_modules_ran() {
            local log="$1"
            local bin_label="$2"
            if ! grep -qE 'parity_table::.* \.\.\. ok' "$log"; then
              echo "::error::${bin_label}: parity_table test module did not run (issue #828 CI proof marker missing) -- check the test-utils feature gate"
              return 1
            fi
            if ! grep -qE 'production_adapter_observation::.* \.\.\. ok' "$log"; then
              echo "::error::${bin_label}: production_adapter_observation test module did not run (issue #828 CI proof marker missing) -- check the test-utils feature gate"
              return 1
            fi
          }

          # if/else (not `cmd; status=$?`): this step runs under the default
          # `bash -e {0}` shell, so a failing bare `cargo test` terminates the
          # script BEFORE the `cat` — the log with the actual failure is never
          # printed (this hid the failing test on a 2026-07-16 main-push run).
          # A command inside an `if` condition is exempt from `-e`.
          if cargo test -p lattice-inference --bin lattice_serve --features f16,metal-gpu,test-utils > lattice_serve_test.log 2>&1; then
            cat lattice_serve_test.log
          else
            lattice_serve_status=$?
            cat lattice_serve_test.log
            echo "::error::cargo test --bin lattice_serve failed (exit $lattice_serve_status)"
            exit "$lattice_serve_status"
          fi
          check_test_utils_modules_ran lattice_serve_test.log lattice_serve

          cargo test -p lattice-inference --bin chat_metal --features f16,metal-gpu
          # test-utils (ADR-080 C2 round 2) gates the tiny zero-weight CPU
          # model the lattice.rs HTTP-level client-disconnect test needs to
          # exercise the real chat_completions -> body_stream cancel_guard
          # -> generate_streaming_with_cancel composition; without it here
          # that test would silently not compile/run under this job.
          # Same if/else form as lattice_serve above, same `-e` reasoning.
          if cargo test -p lattice-inference --bin lattice --features f16,metal-gpu,test-utils > lattice_test.log 2>&1; then
            cat lattice_test.log
          else
            lattice_status=$?
            cat lattice_test.log
            echo "::error::cargo test --bin lattice failed (exit $lattice_status)"
            exit "$lattice_status"
          fi
          check_test_utils_modules_ran lattice_test.log lattice
      # The metal-gpu surface was BUILT and linted above but never RUN, so Metal
      # correctness tests (e.g. the Q4 decode dispatch-geometry regression #384)
      # were local-only — a green CI here verified compilation, not behavior.
      # Run the Q4 Metal correctness tests on the Apple-silicon runner.
      # LATTICE_METAL_TEST_ENFORCE=1 makes the dispatch regression fail closed if
      # the runner ever loses its Apple7 GPU, rather than skip-passing silently.
      - name: inference — QuaRot rotated+Q4 composed forward gate
        run: cargo test -p lattice-inference --lib quarot_rotated_q4_forward_matches_f64_reference -- --nocapture
      - name: inference — metal-gpu Q4 tests (macOS only)
        if: runner.os == 'macOS'
        env:
          LATTICE_METAL_TEST_ENFORCE: '1'
        run: cargo test -p lattice-inference --features f16,metal-gpu --lib q4 -- --nocapture
      # ADR-080 C1 / #789: the `forward::metal::` module's assembled-MSL check and the
      # The NaN/+inf fused_attention fail-closed regressions (#789) silently
      # early-returned when no Metal device was present and were never actually run
      # by any required workflow — the `q4` filter above does not match this module.
      # LATTICE_METAL_TEST_ENFORCE=1 makes a missing device or failed pass
      # construction a hard test failure instead of a skip, matching the Q4 and
      # grammar steps' convention; the exact-count grep guards against a silently
      # zero-matching filter the same way those steps do. The gating command writes
      # its log directly (no pipe) so its exit status gates on its own.
      # The count is 5 since #854: the shared RMS-norm reduction tests
      # (flash_attention_rms_norm_uses_shared_reduction_helper,
      # rms_norm_matches_pre_854_oracle_on_finite_input) live in this same
      # `forward::metal::` module and match the filter. Adding or removing a
      # test in that module requires updating this count in the same PR.
      - name: inference — metal-gpu fused_attention fail-closed gate (macOS only)
        if: runner.os == 'macOS'
        env:
          LATTICE_METAL_TEST_ENFORCE: '1'
        run: |
          set -euo pipefail
          log="${RUNNER_TEMP:-/tmp}/metal-fused-attention-failclosed-test.log"
          if ! cargo test -p lattice-inference --features f16,metal-gpu --lib forward::metal:: -- --nocapture >"$log" 2>&1; then
            cat "$log"
            exit 1
          fi
          cat "$log"
          grep -Eq '^test result: ok\. 5 passed; 0 failed; 0 ignored; 0 measured; [0-9]+ filtered out;' "$log"
      # #611: Metal generation paths applied grammar masks via `mask_logits`
      # but never checked for a surviving finite logit before sampling — a
      # grammar that blocked every token silently emitted token 0 instead of
      # failing closed, unlike the CPU paths (`crate::generate` /
      # `model::qwen35::generation`), which have always guarded every
      # `mask_logits` call this way. These three hardware-gated integration
      # tests prove each real public Metal generation entry point (`generate`,
      # `generate_streaming`, `generate_streaming_with_prefix_cache`) now
      # returns `Err(InvalidInput)` rather than a token when a real
      # `GrammarEngine` blocks every vocab entry. The exact "3 passed; 0
      # failed" grep guards against a silently zero-matching filter, the same
      # failure mode the Q4 and f16-KV steps above already guard against.
      # #611 (major): without LATTICE_METAL_TEST_ENFORCE,
      # each test early-returns (asserted as "passed" by cargo) when
      # `Device::system_default()` is absent, so a runner without a Metal
      # device would silently green this gate without ever exercising the
      # Metal path. LATTICE_METAL_TEST_ENFORCE=1 makes the tests panic instead
      # of returning in that case, matching the Q4/f16-KV steps' convention.
      - name: inference — Metal grammar fail-closed gate (macOS only)
        if: runner.os == 'macOS'
        env:
          LATTICE_METAL_TEST_ENFORCE: '1'
        run: |
          set -euo pipefail
          log="${RUNNER_TEMP:-/tmp}/metal-grammar-failclosed-test.log"
          cargo test -p lattice-inference --features f16,metal-gpu --lib fails_closed_on_all_blocking_grammar -- --nocapture 2>&1 | tee "$log"
          grep -Eq '^test result: ok\. 3 passed; 0 failed; 0 ignored; 0 measured; [0-9]+ filtered out;' "$log"
      # #611 (medium): the three tests above only reach
      # the post-prefill masking site (their fixture blocks every vocab entry
      # from step 0), so removing a DECODE-LOOP `has_finite_logit` guard left
      # them green. These three companion tests use a grammar that dead-ends
      # mid-document (a required continuation byte absent from the vocab), so
      # they exercise the second, decode-loop guard site in each of the three
      # functions. (#1064 renamed these from
      # `fails_closed_on_grammar_blocking_second_token`: that name's fixture
      # actually tested a grammar completing on its second token, which is a
      # successful stop, not a fail-closed case — see
      # `*_completed_grammar_is_success` below.)
      - name: inference — Metal grammar fail-closed decode-loop gate (macOS only)
        if: runner.os == 'macOS'
        env:
          LATTICE_METAL_TEST_ENFORCE: '1'
        run: |
          set -euo pipefail
          log="${RUNNER_TEMP:-/tmp}/metal-grammar-failclosed-decode-test.log"
          cargo test -p lattice-inference --features f16,metal-gpu --lib fails_closed_on_grammar_dead_end -- --nocapture 2>&1 | tee "$log"
          grep -Eq '^test result: ok\. 3 passed; 0 failed; 0 ignored; 0 measured; [0-9]+ filtered out;' "$log"
      # Issue #252 (#238 follow-up): the f16 KV-cache Metal path (opt-in via
      # LATTICE_KV_F16) had no automated test. GitHub's hosted macos-latest
      # exposes a PARAVIRTUAL Metal GPU, not a real Apple7 device — a test
      # gated on `supports_family(Apple7)` would silently skip-pass here. The
      # f16 KV kernels (copy_buf_offset_f16, copy_kv_cache_batch_f16,
      # decode_attention_f16, prefill_attention_batched_causal_f16) are not
      # Apple7-gated, so this leg actually executes them and fails closed:
      # LATTICE_METAL_TEST_ENFORCE=1 panics if no Metal device is present,
      # and the grep below rejects a zero-test filter match as well as a run
      # that never prints the runtime capability marker.
      - name: inference - f16 KV-cache Metal path (macOS only)
        if: runner.os == 'macOS'
        env:
          LATTICE_METAL_TEST_ENFORCE: '1'
          LATTICE_KV_F16: '1'
          LATTICE_METAL_PATH_PROOF: '1'
        run: |
          set -euo pipefail
          log="${RUNNER_TEMP:-/tmp}/f16-kv-metal-test.log"
          cargo test -p lattice-inference --features f16,metal-gpu --lib f16_kv_metal_path_executes_and_reports_capability -- --nocapture 2>&1 | tee "$log"
          grep -Eq '^test result: ok\. 1 passed; 0 failed; 0 ignored; 0 measured; [0-9]+ filtered out;' "$log"
          grep -Fq '[METAL_F16_KV_CAPABILITY] supported=true' "$log"

  # The benchmark harnesses live behind their own feature flags / target gates
  # and are never built by `cargo test`. A `Qwen35Config` field added to the
  # struct but not to the bench's literal initializer (exactly what happened
  # with `quarot_rotation_seed`) only surfaces when the benches are compiled.
  # Runs on Apple Silicon because the inference benches are NEON (aarch64) code;
  # on x86 they are cfg'd out and the gate would be vacuous.
  bench-compile:
    name: bench-compile
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e43eeffd51aefeea929f4ea14e09fd077153e788 # 1.94.1
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: bench-compile
          cache-on-failure: true
      - name: inference benches (bench-internals)
        run: cargo bench -p lattice-inference --features bench-internals,metal-gpu,f16 --no-run
      - name: embed benches
        run: cargo bench -p lattice-embed --no-run

  # MSRV gate (#568). Every other job pins 1.94.1, so an API that stabilized in
  # 1.94 compiles green across all of CI while breaking every user on an older
  # stable — exactly how the nightly-gated NEON f16 intrinsics (stabilized in
  # 1.94, rust-lang/rust#136306) shipped and broke a stable-1.93 user's build.
  # This job compiles the workspace at the declared rust-version instead.
  # macos-latest because it is aarch64 Apple Silicon: the NEON and Metal
  # surfaces only compile there. --all-targets because one of the three #568
  # intrinsic copies lived in a bench target. check (not test): the gate is
  # "compiles at MSRV", behavior is covered by the 1.94.1 jobs above.
  msrv:
    name: msrv (1.93, f16+metal-gpu)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    # RUSTUP_TOOLCHAIN pins every rustup-mediated invocation in this job to 1.93.1.
    # Without it, rustup's checked-in rust-toolchain.toml (1.94.1, repo dev/CI pin)
    # outranks the action's `rustup default 1.93.1`, so `rustup which cargo` and
    # `cargo check` below would silently resolve to 1.94.1 and this gate would stop
    # proving anything about the declared MSRV (see rust-toolchain.toml precedence:
    # https://rust-lang.github.io/rustup/overrides.html).
    env:
      RUSTUP_TOOLCHAIN: "1.93.1"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@683cb613d4ff7d29ceb2fe421b81294b4319512a # 1.93.1
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: msrv
          cache-on-failure: true
      - name: assert selected compiler is 1.93.1
        run: rustc --version | grep -F 1.93.1
      - name: workspace — check at MSRV (f16,metal-gpu, all targets)
        run: cargo check --workspace --features f16,metal-gpu --all-targets

  # Supply-chain gate. licenses/bans/sources are deterministic and REQUIRED:
  # a green main cannot turn red without a manifest/lockfile change. Advisories
  # run separately as informational (continue-on-error) because fresh RUSTSEC
  # entries land with no change of ours and must not wedge merges.
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: licenses + bans + sources (required)
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check licenses bans sources
      - name: advisories (informational)
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        continue-on-error: true
        with:
          command: check advisories

  # Observation job: rustdoc build and intra-doc link lint.
  # NON-BLOCKING. The lint STEP carries continue-on-error: true, so the job
  # concludes success and the commit status stays green while the lint still runs
  # and surfaces findings in the step log. A job-level continue-on-error does NOT
  # neutralize a job's check-run conclusion, so it cannot keep the commit status
  # green (this is why every commit went red). Do NOT add to required-status checks.
  rustdoc-lint:
    name: rustdoc-lint (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e43eeffd51aefeea929f4ea14e09fd077153e788 # 1.94.1
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rustdoc-lint
          cache-on-failure: true
      - name: cargo doc — broken-intra-doc-links and doc warnings (informational)
        continue-on-error: true
        env:
          RUSTDOCFLAGS: >-
            -D warnings
            -D rustdoc::broken_intra_doc_links
            -D rustdoc::private_intra_doc_links
        run: cargo doc --workspace --no-deps

  # Observation job: unwrap/expect usage in workspace library targets.
  # NON-BLOCKING. The lint STEP carries continue-on-error: true, so the job
  # concludes success and the commit status stays green while the lint still
  # surfaces panic-safety debt in the step log. A job-level continue-on-error does
  # NOT neutralize a job's check-run conclusion, so it cannot keep the commit
  # status green. Do NOT add to required-status checks. Expected to show existing
  # debt in the logs.
  unwrap-in-lib-lint:
    name: unwrap-in-lib-lint (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e43eeffd51aefeea929f4ea14e09fd077153e788 # 1.94.1
        with:
          components: clippy
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: unwrap-in-lib-lint
          cache-on-failure: true
      - name: clippy — unwrap/expect in library targets (informational)
        continue-on-error: true
        run: cargo clippy --workspace --lib -- -D clippy::unwrap_used -D clippy::expect_used

  # Cheap ubuntu spell-check. Comments, docs, and error-message strings have
  # no compiler or test to catch a typo, so this is the only gate that reads
  # prose at all. Ungated: the tool itself takes well under a minute.
  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

  # Cheap ubuntu workflow/config lint. Catches malformed expressions, unknown
  # contexts/inputs, shellcheck-level issues, and changed-file range regressions
  # before they only surface as a confusing failure on a live runner. Ungated
  # for the same reason as `typos`: it is a fast, dependency-light check.
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
        with:
          version: '1.7.12'
      - name: merge-queue config tests
        run: python3 tests/test_ci_changed_files.py -v

  # Deterministic fake-adapter unit tests + raw-observation schema validation
  # for the decode-benchmark harness core (issue #813 step 1) and every
  # migrated profile's adapter module (issue #813 step 2: apples_to_apples,
  # apples_precise, q4_apples, context_scaling). Stdlib-only (mlx_lm/ollama
  # are never imported by these test files -- adapters are exercised only
  # through pure parsing helpers and the harness's own deterministic fake
  # adapters), no engine binary or model weights required — cheap
  # ubuntu-only, so it is ungated like typos/actionlint above rather than
  # routed through ci-gate. (The four adapter test files were not wired into
  # any CI job before this issue's step-2 migrations landed; this closes
  # that gap for all of them at once rather than repeating the same
  # omission per migrated script.)
  # The job/check name says "unit-tests (no engine)" on purpose: a green
  # check here proves harness plumbing and parameter transcription ONLY.
  # No benchmark runs, no engine binary executes, no throughput number is
  # produced or validated by this job — reading it as bench evidence is
  # exactly the misread its old name ("bench-decode-harness-tests")
  # invited on the #813 migration PRs.
  decode-harness-unit-tests:
    name: decode-harness-unit-tests (no engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'
      - name: python3 tests/test_bench_decode_harness.py
        run: python3 tests/test_bench_decode_harness.py -v
      - name: python3 tests/test_bench_decode_adapters_apples_to_apples.py
        run: python3 tests/test_bench_decode_adapters_apples_to_apples.py -v
      - name: python3 tests/test_bench_decode_adapters_apples_precise.py
        run: python3 tests/test_bench_decode_adapters_apples_precise.py -v
      - name: python3 tests/test_bench_decode_adapters_q4_apples.py
        run: python3 tests/test_bench_decode_adapters_q4_apples.py -v
      - name: python3 tests/test_bench_decode_adapters_context_scaling.py
        run: python3 tests/test_bench_decode_adapters_context_scaling.py -v
      # bench-compare's Spotlight-exclusion guard. Same "harness plumbing only"
      # scope as the steps above: it asserts the guard's exit codes and the
      # bench-compare.sh call site, and runs no benchmark.
      - name: bash scripts/ensure-noindex-marker-selftest.sh
        run: bash scripts/ensure-noindex-marker-selftest.sh
      - name: python3 tests/test_bench_disposition.py
        run: python3 tests/test_bench_disposition.py -v
      # perf-bench-gate's own fixture self-test. Same "harness plumbing only"
      # scope: it fabricates Criterion trees and asserts the gate's exit codes
      # (including the refusals that keep an automated lane from reading
      # "nothing measured" as "nothing regressed"), and runs no benchmark.
      - name: python3 scripts/perf-bench-gate.py --selftest
        run: python3 scripts/perf-bench-gate.py --selftest
      # bench-compare.sh's measurement-integrity guard. Drives the shipping
      # script in a disposable repo against a stub cargo, so it exercises the
      # real parser-to-guard path; no benchmark runs and no real cargo is
      # invoked, which keeps it in the same harness-plumbing scope as above.
      - name: python3 tests/test_bench_compare_measurement.py
        run: python3 tests/test_bench_compare_measurement.py -v

      # bench-compare.sh's isolation guards: the lock proof (the measurement
      # body refuses unless the supervisor that recorded the lock status is one
      # of its own ancestors) and the ambient-load gate (below the idle floor a
      # run is refused, not warned about). Same disposable-repo, stub-cargo
      # shape as above — no benchmark runs and no real cargo is invoked. Wired
      # here rather than left to a local run, because a guard whose only
      # coverage is somebody remembering to run its test is the same shape as
      # the lock the guard replaced.
      - name: python3 tests/test_bench_locks.py
        run: python3 tests/test_bench_locks.py -v

  # cargo-semver-checks against the latest published crates.io release for
  # every internal path-dependency crate, so a breaking public API change is
  # flagged before it ships unversioned, the way #634 was not. Gated through
  # ci-gate below (it is docs-gated, so it cannot be a direct required
  # context). The v0.5.0 publish reset the baseline: all five crates pass
  # against the published 0.5.0, so this is a real gate, not informational.
  semver-checks:
    name: semver-checks
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: semver-checks
      # metal-gpu does not compile on Linux and must stay off; default-features
      # keeps the check to each crate's own `[features] default = [...]` set
      # rather than the action's heuristic all-features-ish default, which
      # would otherwise try to turn on optional platform-gated features.
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2
        with:
          package: lattice-fann,lattice-transport,lattice-inference,lattice-embed,lattice-tune
          feature-group: default-features

  # REQUIRED status check (see the rollout note at the top of this file).
  # Always runs, always reports. `ci`, `feature-matrix`, `bench-compile`, and
  # `msrv` are matrix and/or docs-gated, so none of them is individually a
  # safe required context: a matrix job skipped at job level never creates
  # its per-combination check runs at all, and a plain gated job that skips
  # reports success even if `changes` itself blew up. This job passes when
  # there is nothing to check (docs-only) and mirrors the five gated jobs'
  # results when there is, exactly like `parity-gate` in e2e-parity.yml and
  # `app-binaries-gate` in app-binaries.yml.
  ci-gate:
    name: ci-gate
    needs: [changes, ci, feature-matrix, bench-compile, msrv, semver-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Resolve gate
        run: |
          CHANGES_RESULT="${{ needs.changes.result }}"
          CODE="${{ needs.changes.outputs.code }}"
          CI_RESULT="${{ needs.ci.result }}"
          FEATURE_MATRIX_RESULT="${{ needs.feature-matrix.result }}"
          BENCH_COMPILE_RESULT="${{ needs.bench-compile.result }}"
          MSRV_RESULT="${{ needs.msrv.result }}"
          SEMVER_RESULT="${{ needs.semver-checks.result }}"
          echo "changes=$CHANGES_RESULT code=$CODE ci=$CI_RESULT feature-matrix=$FEATURE_MATRIX_RESULT bench-compile=$BENCH_COMPILE_RESULT msrv=$MSRV_RESULT semver-checks=$SEMVER_RESULT"
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::change-detection did not succeed, failing closed."
            exit 1
          fi
          if [ "$CODE" != "true" ]; then
            echo "Docs-only change, heavy compile jobs not required. PASS."
            exit 0
          fi
          if [ "$CI_RESULT" != "success" ]; then
            echo "::error::ci did not succeed (result=$CI_RESULT)."
            exit 1
          fi
          if [ "$FEATURE_MATRIX_RESULT" != "success" ]; then
            echo "::error::feature-matrix did not succeed (result=$FEATURE_MATRIX_RESULT)."
            exit 1
          fi
          if [ "$BENCH_COMPILE_RESULT" != "success" ]; then
            echo "::error::bench-compile did not succeed (result=$BENCH_COMPILE_RESULT)."
            exit 1
          fi
          if [ "$MSRV_RESULT" != "success" ]; then
            echo "::error::msrv did not succeed (result=$MSRV_RESULT)."
            exit 1
          fi
          if [ "$SEMVER_RESULT" != "success" ]; then
            echo "::error::semver-checks did not succeed (result=$SEMVER_RESULT)."
            exit 1
          fi
          echo "Code changed; ci, feature-matrix, bench-compile, msrv, and semver-checks all PASSED."
          exit 0
