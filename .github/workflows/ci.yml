name: CI

# NOTE: no `paths-ignore`. Every job here is (or can be) a *required* status
# check, and a required check that never runs leaves a PR stuck on "Expected —
# waiting for status to be reported" forever. So CI always runs on every PR to
# main; the cargo cache keeps doc-only re-runs cheap (nothing recompiles).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LATTICE_REQUIRE_FIXTURES: "1"

jobs:
  ci:
    name: CI
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - name: Pin the real toolchain bin on PATH
        # Some macos-latest runner images ship ~/.cargo/bin/cargo as a copy of
        # rustup-init rather than the rustup proxy, so `cargo fmt` fails with
        # "error: unexpected argument 'fmt'". rustup itself is unaffected — resolve
        # the real toolchain bin dir through it and put it first on PATH so every
        # later step (cache, clean, ci.sh) gets a working cargo. No-op on healthy
        # images and on Linux.
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Clean lattice crates (force rebuild, keep dep cache)
        run: |
          cargo clean -p lattice-inference 2>/dev/null || true
          cargo clean -p lattice-embed 2>/dev/null || true
          cargo clean -p lattice-fann 2>/dev/null || true
          cargo clean -p lattice-tune 2>/dev/null || true
          cargo clean -p lattice-transport 2>/dev/null || true
      - run: ./scripts/ci.sh

  # The default `cargo test/clippy --workspace` only ever compiles DEFAULT
  # features. Feature-gated code (safetensors serialization, the inference-hook
  # bridge, train-backward, metal-gpu kernels) is invisible to it — that is how
  # two real LoRA save/load bugs shipped in `safetensors`-gated code that
  # default CI never built. This job compiles the gated surfaces so they cannot
  # silently rot. `--no-run` on test targets = type-check + codegen without
  # spending runner time executing.
  feature-matrix:
    name: feature-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: feature-matrix
          cache-on-failure: true
      - name: tune — safetensors + inference-hook + serde (compile tests)
        run: cargo test -p lattice-tune --features safetensors,inference-hook,serde --no-run
      - name: tune — train-backward (compile tests)
        run: cargo test -p lattice-tune --features train-backward --no-run
      # The `mixture` feature gates the experimental online router-refit module
      # (crates/tune/src/lora/router_update.rs) behind lattice-fann/online-router.
      # It is off by default, so the required `ci` job never compiles or RUNS its
      # fail-closed validation tests (empty-feedback, wrong context-dim, replay
      # buffer bounds). Build AND run them here so the feature cannot rot silently.
      - name: tune — mixture (online router-refit, build + run tests)
        run: cargo test -p lattice-tune --features mixture --lib
      - name: inference — f16 + train-backward
        run: cargo build -p lattice-inference --features f16,train-backward
      # wgpu-gpu is excluded from default builds and was silently broken under
      # --all-features (gpu/inner module-resolution rot) until #194. Build it on
      # both runners (wgpu compiles host-side without a GPU) so it cannot rot again.
      - name: inference — wgpu-gpu
        run: cargo build -p lattice-inference --features wgpu-gpu
      - name: fann — no default features
        run: cargo build -p lattice-fann --no-default-features
      # Metal kernels only exist on macOS; gate so Linux does not try to build them.
      - name: inference — metal-gpu (macOS only)
        if: runner.os == 'macOS'
        run: cargo build -p lattice-inference --features metal-gpu
      - name: embed — metal-gpu (macOS only)
        if: runner.os == 'macOS'
        run: cargo build -p lattice-embed --features metal-gpu
      # The two metal-gpu legs above build the lattice-inference and lattice-embed
      # libraries (the embed leg pulls in lattice-inference/metal-gpu transitively),
      # so a stale-field constructor in either library is already caught there. What
      # they do NOT compile is the rest of the workspace's metal-gpu surface: the
      # other default-member crates and the metal-gpu-gated binaries. A #537-class
      # drift (a constructor left with a stale field set after a struct grew fields)
      # in that surface compiles clean on both library legs, and the default-feature
      # `ci` job cannot see the metal-gpu surface at all. Compile-only workspace
      # check closes that gap.
      - name: workspace — metal-gpu check (macOS only)
        if: runner.os == 'macOS'
        run: cargo check --workspace --features metal-gpu
      # The required `ci` job runs `cargo clippy --workspace` with DEFAULT
      # features only, so the entire metal-gpu surface — including the ~18K-line
      # metal_qwen35.rs — was never linted, and 34 clippy errors accumulated
      # invisibly (#240). Lint the Metal surface on macOS so it cannot rot.
      # f16,metal-gpu is the production decode combo. --all-targets extends the
      # gate to examples, benches, and #[cfg(test)] modules — the same surface
      # where a second wave of lint debt (manual_let_else, approx_constant,
      # dead bench fields) had silently accumulated past the lib+bins gate.
      - name: inference — metal-gpu clippy (macOS only)
        if: runner.os == 'macOS'
        run: cargo clippy -p lattice-inference --all-targets --features f16,metal-gpu -- -D warnings
      - name: embed — metal-gpu clippy (macOS only)
        if: runner.os == 'macOS'
        run: cargo clippy -p lattice-embed --features metal-gpu -- -D warnings
      # The metal-gpu surface was BUILT and linted above but never RUN, so Metal
      # correctness tests (e.g. the Q4 decode dispatch-geometry regression #384)
      # were local-only — a green CI here verified compilation, not behavior.
      # Run the Q4 Metal correctness tests on the Apple-silicon runner.
      # LATTICE_METAL_TEST_ENFORCE=1 makes the dispatch regression fail closed if
      # the runner ever loses its Apple7 GPU, rather than skip-passing silently.
      - name: inference — QuaRot rotated+Q4 composed forward gate
        run: cargo test -p lattice-inference --lib quarot_rotated_q4_forward_matches_f64_reference -- --nocapture
      - name: inference — metal-gpu Q4 tests (macOS only)
        if: runner.os == 'macOS'
        env:
          LATTICE_METAL_TEST_ENFORCE: '1'
        run: cargo test -p lattice-inference --features f16,metal-gpu --lib q4 -- --nocapture
      # #611: Metal generation paths applied grammar masks via `mask_logits`
      # but never checked for a surviving finite logit before sampling — a
      # grammar that blocked every token silently emitted token 0 instead of
      # failing closed, unlike the CPU paths (`crate::generate` /
      # `model::qwen35::generation`), which have always guarded every
      # `mask_logits` call this way. These three hardware-gated integration
      # tests prove each real public Metal generation entry point (`generate`,
      # `generate_streaming`, `generate_streaming_with_prefix_cache`) now
      # returns `Err(InvalidInput)` rather than a token when a real
      # `GrammarEngine` blocks every vocab entry. The exact "3 passed; 0
      # failed" grep guards against a silently zero-matching filter, the same
      # failure mode the Q4 and f16-KV steps above already guard against.
      - name: inference — Metal grammar fail-closed gate (macOS only)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          log="${RUNNER_TEMP:-/tmp}/metal-grammar-failclosed-test.log"
          cargo test -p lattice-inference --features f16,metal-gpu --lib fails_closed_on_all_blocking_grammar -- --nocapture 2>&1 | tee "$log"
          grep -Eq '^test result: ok\. 3 passed; 0 failed; 0 ignored; 0 measured; [0-9]+ filtered out;' "$log"
      # Issue #252 (#238 follow-up): the f16 KV-cache Metal path (opt-in via
      # LATTICE_KV_F16) had no automated test. GitHub's hosted macos-latest
      # exposes a PARAVIRTUAL Metal GPU, not a real Apple7 device — a test
      # gated on `supports_family(Apple7)` would silently skip-pass here. The
      # f16 KV kernels (copy_buf_offset_f16, copy_kv_cache_batch_f16,
      # decode_attention_f16, prefill_attention_batched_causal_f16) are not
      # Apple7-gated, so this leg actually executes them and fails closed:
      # LATTICE_METAL_TEST_ENFORCE=1 panics if no Metal device is present,
      # and the grep below rejects a zero-test filter match as well as a run
      # that never prints the runtime capability marker.
      - name: inference - f16 KV-cache Metal path (macOS only)
        if: runner.os == 'macOS'
        env:
          LATTICE_METAL_TEST_ENFORCE: '1'
          LATTICE_KV_F16: '1'
          LATTICE_METAL_PATH_PROOF: '1'
        run: |
          set -euo pipefail
          log="${RUNNER_TEMP:-/tmp}/f16-kv-metal-test.log"
          cargo test -p lattice-inference --features f16,metal-gpu --lib f16_kv_metal_path_executes_and_reports_capability -- --nocapture 2>&1 | tee "$log"
          grep -Eq '^test result: ok\. 1 passed; 0 failed; 0 ignored; 0 measured; [0-9]+ filtered out;' "$log"
          grep -Fq '[METAL_F16_KV_CAPABILITY] supported=true' "$log"

  # The benchmark harnesses live behind their own feature flags / target gates
  # and are never built by `cargo test`. A `Qwen35Config` field added to the
  # struct but not to the bench's literal initializer (exactly what happened
  # with `quarot_rotation_seed`) only surfaces when the benches are compiled.
  # Runs on Apple Silicon because the inference benches are NEON (aarch64) code;
  # on x86 they are cfg'd out and the gate would be vacuous.
  bench-compile:
    name: bench-compile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-compile
          cache-on-failure: true
      - name: inference benches (bench-internals)
        run: cargo bench -p lattice-inference --features bench-internals,metal-gpu,f16 --no-run
      - name: embed benches
        run: cargo bench -p lattice-embed --no-run

  # MSRV gate (#568). Every other job pins 1.94.1, so an API that stabilized in
  # 1.94 compiles green across all of CI while breaking every user on an older
  # stable — exactly how the nightly-gated NEON f16 intrinsics (stabilized in
  # 1.94, rust-lang/rust#136306) shipped and broke a stable-1.93 user's build.
  # This job compiles the workspace at the declared rust-version instead.
  # macos-latest because it is aarch64 Apple Silicon: the NEON and Metal
  # surfaces only compile there. --all-targets because one of the three #568
  # intrinsic copies lived in a bench target. check (not test): the gate is
  # "compiles at MSRV", behavior is covered by the 1.94.1 jobs above.
  msrv:
    name: msrv (1.93, f16+metal-gpu)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv
          cache-on-failure: true
      - name: workspace — check at MSRV (f16,metal-gpu, all targets)
        run: cargo check --workspace --features f16,metal-gpu --all-targets

  # Supply-chain gate. licenses/bans/sources are deterministic and REQUIRED:
  # a green main cannot turn red without a manifest/lockfile change. Advisories
  # run separately as informational (continue-on-error) because fresh RUSTSEC
  # entries land with no change of ours and must not wedge merges.
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: licenses + bans + sources (required)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources
      - name: advisories (informational)
        uses: EmbarkStudios/cargo-deny-action@v2
        continue-on-error: true
        with:
          command: check advisories

  # Observation job: rustdoc build and intra-doc link lint.
  # NON-BLOCKING. The lint STEP carries continue-on-error: true, so the job
  # concludes success and the commit status stays green while the lint still runs
  # and surfaces findings in the step log. A job-level continue-on-error does NOT
  # neutralize a job's check-run conclusion, so it cannot keep the commit status
  # green (this is why every commit went red). Do NOT add to required-status checks.
  rustdoc-lint:
    name: rustdoc-lint (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rustdoc-lint
          cache-on-failure: true
      - name: cargo doc — broken-intra-doc-links and doc warnings (informational)
        continue-on-error: true
        env:
          RUSTDOCFLAGS: >-
            -D warnings
            -D rustdoc::broken_intra_doc_links
            -D rustdoc::private_intra_doc_links
        run: cargo doc --workspace --no-deps

  # Observation job: unwrap/expect usage in workspace library targets.
  # NON-BLOCKING. The lint STEP carries continue-on-error: true, so the job
  # concludes success and the commit status stays green while the lint still
  # surfaces panic-safety debt in the step log. A job-level continue-on-error does
  # NOT neutralize a job's check-run conclusion, so it cannot keep the commit
  # status green. Do NOT add to required-status checks. Expected to show existing
  # debt in the logs.
  unwrap-in-lib-lint:
    name: unwrap-in-lib-lint (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: unwrap-in-lib-lint
          cache-on-failure: true
      - name: clippy — unwrap/expect in library targets (informational)
        continue-on-error: true
        run: cargo clippy --workspace --lib -- -D clippy::unwrap_used -D clippy::expect_used
