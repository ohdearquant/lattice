name: app-binaries
# Regression gate: build every binary the macOS Studio app ships, each with its
# required-features. `cargo build --workspace` skips required-features bins, so
# this is the only CI that compiles chat_metal / eval_perplexity / lattice_serve
# / train_grad_full / generate_lora / embed with the features the app actually
# builds them with.
# See scripts/build-app-bins.sh for the rationale and the two regressions that
# motivated it.
#
# Required-check shape (ADR-066 F-1): the workflow ALWAYS triggers on PRs and
# merge groups (no `paths:` filter on either event), but the expensive macOS
# build job only runs when app-binary-relevant files change. The cheap always-running
# `app-binaries-gate` job is the status context to mark required — it passes
# when there is nothing to build and mirrors the build result when there is.
# This avoids the trap where a path-filtered required check never reports on
# docs-only PRs and wedges them on "Expected — waiting for status".

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/build-app-bins.sh'
      - 'scripts/ci-changed-files.sh'
      - 'apps/macos/scripts/package-app.sh'
      - '.github/workflows/app-binaries.yml'
  workflow_dispatch:
  merge_group:
    branches: [main]
    types: [checks_requested]

# Cancel a PR's own superseded runs so they stop occupying the shared macOS
# runner pool (~5 concurrent, account-wide) while a newer push on the same PR
# waits behind them. Never cancel a push to main or a manual dispatch: neither
# has a "next run" to fall back on if killed mid-flight. The event_name segment
# keeps a push run and a workflow_dispatch run on the same ref out of each
# other's queue: GitHub cancels a PENDING run whenever another run enters its
# group, even with cancel-in-progress false, so two different trigger kinds
# sharing one group could still replace each other while queued.
concurrency:
  group: app-binaries-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'

jobs:
  # Decide whether the app-binary surface changed. Output drives both the
  # expensive build job and the required gate below.
  changes:
    name: detect-app-bin-changes
    runs-on: ubuntu-latest
    outputs:
      bins: ${{ steps.filter.outputs.bins }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          CI_HEAD_SHA: ${{ github.event.merge_group.head_sha || github.sha }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "bins=true" >> "$GITHUB_OUTPUT"
            echo "→ manual dispatch: app-binary build REQUIRED"
            exit 0
          fi
          CHANGED=$(./scripts/ci-changed-files.sh)
          echo "Changed files:"
          echo "$CHANGED"
          # here-string, not `echo | grep -q`: -q exits at first match, echo gets
          # SIGPIPE, and under pipefail the pipeline reports 141 → the else branch
          # would silently skip the build on large diffs (fail-open).
          if grep -E '^crates/|^Cargo\.(toml|lock)$|^scripts/(build-app-bins|ci-changed-files)\.sh$|^apps/macos/scripts/package-app\.sh$|^\.github/workflows/app-binaries\.yml$' <<<"$CHANGED" >/dev/null; then
            echo "bins=true" >> "$GITHUB_OUTPUT"
            echo "→ app-binary surface changed: build REQUIRED"
          else
            echo "bins=false" >> "$GITHUB_OUTPUT"
            echo "→ no app-binary change: build skipped, gate passes"
          fi

  build-app-bins:
    name: build app-shipped binaries
    needs: changes
    if: needs.changes.outputs.bins == 'true'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: app-binaries
      - name: Build all app-shipped binaries (required-features included)
        run: ./scripts/build-app-bins.sh

  # Required status context (ADR-066 F-1). Fails closed on change-detection
  # failure, passes when nothing relevant changed, otherwise mirrors the build.
  app-binaries-gate:
    name: app-binaries-gate
    needs: [changes, build-app-bins]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Resolve gate
        run: |
          CHANGES_RESULT="${{ needs.changes.result }}"
          BINS="${{ needs.changes.outputs.bins }}"
          BUILD_RESULT="${{ needs.build-app-bins.result }}"
          echo "changes=$CHANGES_RESULT bins=$BINS build=$BUILD_RESULT"
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::change-detection did not succeed — failing closed."
            exit 1
          fi
          if [ "$BINS" != "true" ]; then
            echo "No app-binary change — build not required. PASS."
            exit 0
          fi
          if [ "$BUILD_RESULT" != "success" ]; then
            echo "::error::App-binary surface changed and build did not succeed (result=$BUILD_RESULT)."
            exit 1
          fi
          echo "App-binary surface changed; build PASSED."
          exit 0
