name: 'Provision Qwen3.5-0.8B (pinned + hash-verified)'
description: >-
  Downloads Qwen/Qwen3.5-0.8B at a pinned revision and verifies the snapshot
  before any job consumes it: every file must match its expected digest, and
  the directory must contain nothing else. Single source of truth for the
  revision and expected hashes, reused by every e2e-parity job that needs this
  checkpoint. Bump the revision and hashes here once rather than per job.
outputs:
  model-dir:
    description: 'Local snapshot directory for the downloaded model.'
    value: ${{ steps.download.outputs.model_dir }}
runs:
  using: 'composite'
  steps:
    - id: download
      shell: bash
      env:
        # Pinned to an immutable commit so a later push to the upstream
        # repository (accidental or malicious) cannot silently change what
        # feeds native Rust model loading in every consuming job. Bump
        # deliberately: fetch the new commit's tree via the HF API, verify
        # the new hashes out-of-band, then update both this revision and
        # the checksums in the verify step below together.
        QWEN35_0_8B_REVISION: 2fc06364715b967f1860aea9cf38778875588b17
      run: |
        set -euo pipefail
        MODEL_CACHE=$(python3 -c "
        from huggingface_hub import snapshot_download
        print(snapshot_download('Qwen/Qwen3.5-0.8B', revision='$QWEN35_0_8B_REVISION'))
        ")
        echo "model_dir=$MODEL_CACHE" >> "$GITHUB_OUTPUT"

    # Two checks, because pinning digests alone is not enough. Verifying a list
    # of expected files proves nothing about files that are not on the list, and
    # transformers reads more of a model directory than the weights: an added
    # generation_config.json is picked up at load time and its suppress_tokens,
    # bad_words_ids or sequence_bias fields change the first greedy token, which
    # is exactly what the parity gate compares. Reproduced against this pinned
    # snapshot: injecting one such file moved the reference continuation from
    # " Paris." to " the capital of" while every pinned digest still matched.
    # So the directory has to be an exact set, not a superset.
    #
    # Every file the pinned revision ships is listed, including ones no current
    # caller reads. Once additions are in scope, the list doubles as the
    # completeness allowlist, so leaving a legitimate file off it would either
    # fail every run or force a hole in the exact-set check.
    #
    # Bash 3.2 compatible (macos-latest ships Bash 3.2, which has no
    # `declare -A`): a newline-delimited "<sha256>  <filename>" manifest piped
    # through `shasum -a 256 -c`. `-c` fails closed on both a hash mismatch and
    # a missing file (non-zero exit, one FAILED line naming the file in both
    # cases), so no separate missing-file branch is needed. The completeness
    # check derives its allowlist from the same manifest so the two cannot drift.
    - id: verify
      shell: bash
      env:
        MODEL_CACHE: ${{ steps.download.outputs.model_dir }}
      run: |
        set -euo pipefail
        cd "$MODEL_CACHE"

        MANIFEST="$(mktemp)"
        cat > "$MANIFEST" <<'HASHES'
        273d8e0e683b885071fb17e08d71e5f2a5ddfb5309756181681de4f5a1822d80  chat_template.jinja
        b90b86f35c8e6925ef74ee04d0e758f0a845c83a42089ad82bbaa948de9b4204  config.json
        a9d356d7bdf1ef4949e3e748e95b8e10ad9d4e2e838eddc38a0a7b6b94d1db8d  merges.txt
        04b1c301231dd422b8860db31311ab2721511346a32cb1e079c4c4e5f1fe4696  model.safetensors-00001-of-00001.safetensors
        d8a08838a613b025eb7952ed9db11696213e57e76a375661ef5c12f9dd5dcf4e  model.safetensors.index.json
        27225450ac9c6529872ee1924fcb0962ff5634834f817040f444118116f4e516  preprocessor_config.json
        5f9e4d4901a92b997e463c1f46055088b6cca5ca61a6522d1b9f64c4bb81cb42  tokenizer.json
        49e2b6e395f959f077f1e992b338919c0d4a9732fc6e613995e06557f843500c  tokenizer_config.json
        7768af27c1fafa9cc9011c1dc20067e03f8915e03b63504550e11d5066986d13  video_preprocessor_config.json
        ce99b4cb2983d118806ce0a8b777a35b093e2000a503ebde25853284c9dfa003  vocab.json
        HASHES

        # Contents: every listed file is present and unmodified.
        shasum -a 256 -c "$MANIFEST"

        # Completeness: nothing else is present. `ls -A` includes dotfiles, so a
        # hidden addition fails too. The pinned huggingface_hub writes only the
        # repository's own files here (checked against the version this workflow
        # installs), so a surprise entry means the snapshot is not what was
        # pinned, whichever way it got there.
        EXPECTED="$(mktemp)"
        awk '{ print $2 }' "$MANIFEST" > "$EXPECTED"
        UNEXPECTED="$(ls -A | grep -vxF -f "$EXPECTED" || true)"
        if [ -n "$UNEXPECTED" ]; then
          echo "::error::provisioned snapshot contains entries that are not hash-verified: $(echo "$UNEXPECTED" | tr '\n' ' ')"
          echo "Refusing to hand an unverified reference to the parity gate." >&2
          exit 1
        fi
