<svg width="256" height="256" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lattice">
  <!-- Triangular lattice unit cell: 7 nodes, 12 edges, accented center.
       Reads as a crystal lattice; legible down to ~16px. -->
  <g stroke="#334155" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <line x1="20" y1="16" x2="44" y2="16"/>
    <line x1="20" y1="16" x2="8"  y2="32"/>
    <line x1="20" y1="16" x2="32" y2="32"/>
    <line x1="44" y1="16" x2="32" y2="32"/>
    <line x1="44" y1="16" x2="56" y2="32"/>
    <line x1="8"  y1="32" x2="32" y2="32"/>
    <line x1="32" y1="32" x2="56" y2="32"/>
    <line x1="8"  y1="32" x2="20" y2="48"/>
    <line x1="32" y1="32" x2="20" y2="48"/>
    <line x1="32" y1="32" x2="44" y2="48"/>
    <line x1="56" y1="32" x2="44" y2="48"/>
    <line x1="20" y1="48" x2="44" y2="48"/>
  </g>
  <g fill="#0f172a">
    <circle cx="20" cy="16" r="4.2"/>
    <circle cx="44" cy="16" r="4.2"/>
    <circle cx="8"  cy="32" r="4.2"/>
    <circle cx="56" cy="32" r="4.2"/>
    <circle cx="20" cy="48" r="4.2"/>
    <circle cx="44" cy="48" r="4.2"/>
  </g>
  <circle cx="32" cy="32" r="5.4" fill="#10b981"/>
  <circle cx="32" cy="32" r="2.1" fill="#ffffff" fill-opacity="0.92"/>
</svg>
