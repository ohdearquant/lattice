[project]
name = "lattice-dev"
version = "0.1.0"
description = "Dev scripts for lattice inference engine"
requires-python = ">=3.11"

dependencies = [
    "pyarrow>=17.0",
    "datasets>=3.0",
    "numpy>=1.26",
    "mlx>=0.22",
    "mlx-lm>=0.21",
    "transformers>=4.46",
    "matplotlib>=3.9",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
]
