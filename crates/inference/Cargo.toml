[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }
approx = "0.5"
criterion = { version = "0.5", features = ["html_reports"] }
proptest = { workspace = true }
tempfile = { workspace = true }
# Partial-body polling (`BodyExt::frame`) for the `lattice.rs` HTTP-level
# client-disconnect test (ADR-080 C2): axum's own
# `to_bytes` reads to EOF or errors past a byte cap, neither of which lets a
# test read N real SSE frames then drop the body mid-stream to simulate a
# disconnect. Already an axum 0.8 transitive dependency at the same version;
# this just makes it a direct dev-dependency so test code can `use` it.
http-body-util = { workspace = true }
# Drives real HTTP requests (built from `CHAT_COMPLETIONS_PARITY_CASES`
# fixture bodies) through each binary's `Router` via `ServiceExt::oneshot`
# for the cross-binary parity table (ADR-080 C2).
# Already an axum 0.8 transitive dependency (axum's `Router` implements
# `tower::Service`); `util` is the feature gating `ServiceExt`/`oneshot`,
# kept at this use site (the version itself moved
# to `[workspace.dependencies]`, feature selection stays local).
tower = { workspace = true, features = ["util"] }

