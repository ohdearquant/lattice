[package]
name = "lattice-inference"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Pure Rust transformer inference engine — safetensors loading, SIMD matmul, BGE/Qwen3 embeddings"
# Heavy test-only fixtures (~40MB raw) push the packaged crate past the
# crates.io 10MB upload limit. They are consumed only by integration tests,
# which are never run from the published crate.
exclude = ["tests/fixtures/tokenizers", "tests/fixtures/gdn_chunk"]

[features]
default = ["std", "download", "serve"]
# HTTP serving stack (axum/tokio/futures) for the `lattice` CLI's serve
# command and the standalone `lattice_serve` binary. On by default so a plain
# `cargo install lattice-inference` keeps shipping the `lattice` CLI
# unchanged, and existing `--features f16,metal-gpu` install/package profiles
# keep including `lattice_serve` without needing an extra flag. Library
# consumers building with `default-features = false` no longer pull an HTTP
# server into their dependency tree (the lib itself never uses it).
serve = ["dep:axum", "dep:tokio", "dep:futures"]
std = []
f16 = []
metal-gpu = ["dep:metal", "dep:objc"]
wgpu-gpu = ["dep:wgpu", "dep:pollster", "dep:bytemuck"]
bench-internals = []
bench-ort = ["dep:ort", "dep:tokenizers", "f16"]
backfill = ["dep:rusqlite", "f16"]
download = ["dep:ureq"]
train-backward = []
# AdapterRouter gate: enables the lattice-fann backed routing module.
# blend_lora_layer_data and generate_with_lora_mixture do NOT require this
# feature — they are always available.
mixture = ["dep:lattice-fann"]
# GDN state-traffic byte counters (issue #422, measure-first for ADR-058).
# Opt-in only: the default decode path stays byte-identical when this is off.
gdn-state-counters = []
# Exposes test-only fixture constructors (currently: a tiny all-zero-weight
# Qwen35Model, ADR-080 C2) as `pub` library API, gated so they never
# ship in a normal build. Needed because bin targets (lattice.rs,
# lattice_serve.rs) link against this crate as an ordinary dependency and
# cannot see its `#[cfg(test)]`-only internals -- only a real Cargo feature
# crosses that boundary.
test-utils = []

[dependencies]
half.workspace = true
memmap2 = "0.9"
indexmap = "2"
rustc-hash = "2"
rayon = { workspace = true }
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
clap = { workspace = true }
axum = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
ureq = { version = "2", features = ["tls"], optional = true }
sha2.workspace = true
rusqlite = { workspace = true, optional = true }
metal = { version = "0.33", optional = true }
objc = { version = "0.2", optional = true }
wgpu = { version = "24", optional = true }
pollster = { version = "0.4", optional = true }
bytemuck = { version = "1", features = ["derive"], optional = true }
ort = { version = "2.0.0-rc.12", optional = true }
tokenizers = { version = "0.22", optional = true, default-features = false, features = ["progressbar", "onig"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
lattice-fann = { version = "0.7.0", path = "../fann", optional = true }

