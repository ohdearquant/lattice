harness = false
required-features = ["bench-internals"]

[[bench]]
name = "metal_decode_bench"
harness = false
required-features = ["metal-gpu", "f16"]

[[bench]]
name = "mtp_decode"
harness = false
required-features = ["metal-gpu", "f16"]

[[bench]]
name = "lm_head_bench"
harness = false

[[bench]]
name = "elementwise_cpu_bench"
harness = false

[[bench]]
name = "elementwise_bench"
harness = false

